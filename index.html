<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 尋找地圖：100題終極挑戰 🌟</title>
    <style>
        :root { 
            --main-green: #27AE60;
            --light-green: #E8F5E9;
            --dark-green: #1E8449;
            --bg-cream: #FAF9F6;
        }

        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background-color: var(--bg-cream); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0;
        }

        #game-container { 
            background: white; padding: 40px; border-radius: 40px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            width: 95%; max-width: 600px; text-align: center; border: 8px solid var(--light-green);
        }

        h1 { color: var(--main-green); font-size: 1.8rem; margin-top: 0; }
        
        .progress-bar {
            background: #f0f0f0; border-radius: 10px; margin-bottom: 20px;
            font-weight: bold; color: var(--dark-green); padding: 5px;
            font-size: 0.9rem;
        }

        .intro-text { color: #5D6D7E; line-height: 1.6; margin-bottom: 25px; text-align: left; background: #f9f9f9; padding: 20px; border-radius: 20px; border: 1px solid #eee; }

        .scene-info { 
            background: var(--light-green); padding: 25px; border-radius: 30px; 
            margin-bottom: 25px; border: 2px solid #C8E6C9; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .en { font-size: 1.35rem; font-weight: 800; color: var(--dark-green); line-height: 1.4; }

        .hint-bar { 
            background: #FFF9C4; padding: 12px; border-radius: 15px; 
            margin-bottom: 25px; font-size: 0.95rem; border: 1px solid #F9E79F; color: #7D6608;
        }

        input[type="text"] { 
            width: 100%; padding: 18px; border: 3px solid #E5E8E8; border-radius: 20px; 
            font-size: 1.2rem; box-sizing: border-box; text-align: center; outline: none; margin-bottom: 15px;
        }

        .btn-main { 
            background-color: var(--main-green); color: white; border: none;
            padding: 18px; border-radius: 20px; font-size: 1.2rem; font-weight: bold; 
            width: 100%; cursor: pointer; box-shadow: 0 6px 0 var(--dark-green); margin-bottom: 15px;
        }

        #feedback { 
            margin-top: 20px; min-height: 110px; padding: 20px; border-radius: 25px; 
            display: none; align-items: center; gap: 20px; text-align: left;
        }
        .fb-score { font-size: 1.5rem; font-weight: 900; white-space: nowrap; flex-shrink: 0; min-width: 90px; text-align: center; }
        .fb-divider { width: 2px; height: 60px; background: rgba(0,0,0,0.1); flex-shrink: 0; }
        .fb-text { font-size: 1.05rem; line-height: 1.5; flex-grow: 1; }

        .fb-correct { background: #E8F8F5; color: #148F77; border: 2px solid #A3E4D7; display: flex !important; }
        .fb-try { background: #FDEDEC; color: #943126; border: 2px solid #FADBD8; display: flex !important; }

        /* 修正結尾清單，防止分數遮擋文字 */
        .summary-item { 
            background: #FDFEFE; margin-bottom: 15px; padding: 20px; 
            border-radius: 25px; border: 1px solid #EBEDEF; 
            text-align: left; display: flex; flex-direction: column; gap: 10px;
        }
        .summary-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .summary-title { font-weight: bold; color: #34495E; flex-grow: 1; line-height: 1.4; }
        .score-badge { padding: 4px 12px; border-radius: 10px; font-weight: 900; color: white; white-space: nowrap; font-size: 0.9rem; }
        .s10 { background: var(--main-green); } .s9, .s8 { background: #F39C12; } .s5 { background: #E74C3C; }
        .summary-answer { font-size: 0.9rem; color: #7F8C8D; border-top: 1px dashed #eee; padding-top: 8px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <div style="font-size: 5rem; margin-bottom: 15px;">🌍</div>
        <h1>尋找地圖：100題終極挑戰</h1>
        <div class="intro-text">
            <b>📜 冒險手冊：</b><br>
            地圖庫擴充至 100 題！每一輪會隨機挑選 5 個不同的場景。<br><br>
            <b>⭐ 得分秘訣：</b><br>
            - 完整回答 (It is...) 拿滿分。<br>
            - 最後一關地圖題請用 <b>The map is...</b>。
        </div>
        <button class="btn-main" onclick="startGame()">開始 100 題冒險</button>
    </div>

    <div id="game-play" style="display:none;">
        <div class="progress-bar" id="progress-text">Level 1 / 5</div>
        
        <div class="scene-info">
            <span class="en" id="text-en"></span>
            <button style="background:#A5D6A7; border:none; color:white; border-radius:8px; padding:4px 10px; cursor:pointer; align-self:center; margin-top:10px;" id="btn-show-zh" onclick="document.getElementById('zh-box').style.display='block'; this.style.display='none'">查看翻譯</button>
            <div id="zh-box" style="display:none; color: #7D6608; font-size: 0.9rem; margin-top:10px; border-top: 1px solid #C8E6C9; padding-top:10px;"></div>
        </div>

        <div class="hint-bar" id="dynamic-hint">💡 記得主詞 + is 喔！</div>

        <input type="text" id="user-input" placeholder="請在此輸入英文答案..." onkeypress="if(event.key==='Enter')checkAnswer()">
        <button class="btn-main" id="submit-btn" onclick="checkAnswer()">確認答案</button>
        <button style="background:none; border:2px solid var(--main-green); color:var(--main-green); padding:12px; border-radius:20px; width:100%; cursor:pointer; font-weight:bold;" onclick="speakText()">🔊 再聽一次題目</button>
        
        <div id="feedback">
            <div class="fb-score" id="fb-score-val"></div>
            <div class="fb-divider"></div>
            <div class="fb-text" id="fb-text-val"></div>
        </div>
    </div>

    <div id="end-screen" style="display:none;">
        <div style="font-size: 4rem; margin-bottom: 10px;">🏆</div>
        <h2 style="color:var(--main-green);">冒險完成！</h2>
        <div id="summary-content"></div>
        <button class="btn-main" onclick="location.reload()">重新挑戰</button>
    </div>
</div>

            { id: "off", en: "Is the file in the cabinet or on the shelf?", zh: "檔案在櫃子裡還是在架子上？", pre: ["in", "on"], items: ["cabinet", "shelf"] },
            { id: "off", en: "Is the coffee in the mug or on the floor?", zh: "咖啡在馬克杯裡還是在地板上？", pre: ["in", "on"], items: ["mug", "floor"] },
            { id: "off", en: "Is the stamp next to the letter or in the box?", zh: "郵票在信旁邊還是在箱子裡？", pre: ["next to", "in"], items: ["letter", "box"] },
            { id: "off", en: "Is the clock behind the plant or on the wall?", zh: "時鐘在植物後還是在牆上？", pre: ["behind", "on"], items: ["plant", "wall"] },
            { id: "off", en: "Is the pen under the paper or next to the mouse?", zh: "筆在紙下面還是在滑鼠旁邊？", pre: ["under", "next to"], items: ["paper", "mouse"] },
            { id: "off", en: "Is the key in the lock or on the ring?", zh: "鑰匙在鎖裡還是在環上？", pre: ["in", "on"], items: ["lock", "ring"] },
            { id: "off", en: "Is the card behind the monitor or in the wallet?", zh: "卡片在螢幕後還是在皮夾裡？", pre: ["behind", "in"], items: ["monitor", "wallet"] },
            { id: "off", en: "Is the chair next to the window or under the light?", zh: "椅子在窗戶旁邊還是在燈下面？", pre: ["next to", "under"], items: ["window", "light"] }
        ],
        livingRoom: [
            { id: "liv", en: "The map is not behind the TV. It is next to the sofa. Where is it?", zh: "地圖不在電視後面，在沙發旁邊。地圖在哪裡？", pre: ["next to"], items: ["sofa"], negative: ["behind", "tv"] },
            { id: "liv", en: "The map is not under the rug. It is on the armchair. Where is it?", zh: "地圖不在地毯下面，在扶手椅子上。地圖在哪裡？", pre: ["on"], items: ["armchair"], negative: ["under", "rug"] },
            { id: "liv", en: "The map is not on the coffee table. It is behind the picture. Where is it?", zh: "地圖不在咖啡桌上，在畫的後面。地圖在哪裡？", pre: ["behind"], items: ["picture"], negative: ["on", "coffee table"] },
            { id: "liv", en: "The map is not next to the lamp. It is in the drawer. Where is it?", zh: "地圖不在燈旁邊，在抽屜裡。地圖在哪裡？", pre: ["in"], items: ["drawer"], negative: ["next to", "lamp"] },
            { id: "liv", en: "The map is not in the cabinet. It is under the cushion. Where is it?", zh: "地圖不在櫃子裡，在墊子下面。地圖在哪裡？", pre: ["under"], items: ["cushion"], negative: ["in", "cabinet"] },
            { id: "liv", en: "The map is not behind the clock. It is on the shelf. Where is it?", zh: "地圖不在時鐘後面，在架子上。地圖在哪裡？", pre: ["on"], items: ["shelf"], negative: ["behind", "clock"] },
            { id: "liv", en: "The map is not under the sofa. It is next to the plant. Where is it?", zh: "地圖不在沙發下面，在植物旁邊。地圖在哪裡？", pre: ["next to"], items: ["plant"], negative: ["under", "sofa"] },
            { id: "liv", en: "The map is not on the piano. It is in the box. Where is it?", zh: "地圖不在鋼琴上，在箱子裡。地圖在哪裡？", pre: ["in"], items: ["box"], negative: ["on", "piano"] },
            { id: "liv", en: "The map is not next to the door. It is under the rug. Where is it?", zh: "地圖不在門旁邊，在地毯下面。地圖在哪裡？", pre: ["under"], items: ["rug"], negative: ["next to", "door"] },
            { id: "liv", en: "The map is not in the vase. It is behind the curtains. Where is it?", zh: "地圖不在花瓶裡，在窗簾後面。地圖在哪裡？", pre: ["behind"], items: ["curtains"], negative: ["in", "vase"] }
        ]
    };

    let selectedScenes = [];
    let currentLevel = 0, playerHistory = [];

    function startGame() {
        const shuffle = (array) => array.sort(() => Math.random() - 0.5);
        const sceneKeys = shuffle(Object.keys(questionBank).filter(k => k !== "livingRoom"));
        
        selectedScenes = [
            shuffle([...questionBank[sceneKeys[0]]])[0],
            shuffle([...questionBank[sceneKeys[1]]])[0],
            shuffle([...questionBank[sceneKeys[2]]])[0],
            shuffle([...questionBank[sceneKeys[3]]])[0],
            shuffle([...questionBank.livingRoom])[0]
        ];

        document.getElementById('start-screen').style.display = "none";
        document.getElementById('game-play').style.display = "block";
        currentLevel = 0; playerHistory = [];
        updateScene();
    }

    function updateScene() {
        if (currentLevel < selectedScenes.length) {
            const s = selectedScenes[currentLevel];
            document.getElementById('feedback').style.display = "none";
            document.getElementById('progress-text').innerText = `Level ${currentLevel + 1} / ${selectedScenes.length}`;
            document.getElementById('user-input').value = "";
            document.getElementById('text-en').innerText = s.en;
            document.getElementById('zh-box').innerText = s.zh;
            document.getElementById('zh-box').style.display = "none";
            document.getElementById('btn-show-zh').style.display = "inline-block";
            
            const hint = document.getElementById('dynamic-hint');
            hint.innerHTML = (s.id === "liv") ? "💡 地圖題！請用 <b>The map is...</b>" : "💡 請用 <b>It is...</b> 拿高分！";

            setTimeout(() => { speakText(); }, 500);
            document.getElementById('user-input').focus();
        } else { showEndScreen(); }
    }

    function speakText() {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(selectedScenes[currentLevel].en);
        utter.lang = 'en-US'; utter.rate = 0.8; window.speechSynthesis.speak(utter);
    }

    function checkAnswer() {
        const input = document.getElementById('user-input').value.toLowerCase().trim();
        if (!input) return;

        const s = selectedScenes[currentLevel];
        const fb = document.getElementById('feedback');
        const scoreVal = document.getElementById('fb-score-val');
        const textVal = document.getElementById('fb-text-val');

        if (input.includes(" or ")) {
            fb.className = "fb-try"; fb.style.display = "flex";
            scoreVal.innerText = "不要 or"; textVal.innerHTML = "請選一個位置回答。";
            return;
        }

        if (s.id === "liv" && !input.startsWith("the map")) {
            fb.className = "fb-try"; fb.style.display = "flex";
            scoreVal.innerText = "開頭錯誤"; textVal.innerHTML = "地圖題請練習用『The map is...』開頭。";
            return;
        }

        const hasCorrectPre = s.pre.some(p => input.includes(p));
        const hasCorrectItem = s.items.some(item => input.includes(item));

        if (hasCorrectPre && hasCorrectItem) {
            let score = 5;
            let aiTip = "答對了！";
            const hasIs = input.includes("is") || input.includes("'s");
            if (hasIs) { score = 10; aiTip = "完美的完整句子！🌟"; }
            else { score = 8; aiTip = "很棒！加上 is 會更完美。"; }

            playerHistory.push({ title: s.en, answer: input, score: score });
            fb.className = "fb-correct"; fb.style.display = "flex";
            scoreVal.innerText = `+${score}`; textVal.innerHTML = aiTip;
            
            document.getElementById('submit-btn').disabled = true;
            setTimeout(() => { 
                currentLevel++; 
                document.getElementById('submit-btn').disabled = false;
                updateScene(); 
            }, 3000);
            return;
        }

        if (s.negative && s.negative.some(n => input.includes(n))) {
            fb.className = "fb-try"; fb.style.display = "flex";
            scoreVal.innerText = "陷阱！"; textVal.innerHTML = "題目說『不在』那裡喔。";
            return;
        }

        fb.className = "fb-try"; fb.style.display = "flex";
        scoreVal.innerText = "單字錯誤"; textVal.innerHTML = "物品或位置不對喔，再檢查一下。";
    }

    function showEndScreen() {
        document.getElementById('game-play').style.display = "none";
        document.getElementById('end-screen').style.display = "block";
        let html = "";
        playerHistory.forEach(h => {
            html += `<div class="summary-item">
                        <div class="summary-header">
                            <div class="summary-title">📍 ${h.title}</div>
                            <div class="score-badge s${h.score}">${h.score}分</div>
                        </div>
                        <div class="summary-answer">我的回答：${h.answer}</div>
                     </div>`;
        });
        document.getElementById('summary-content').innerHTML = html;
    }
</script>
